<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanchaPro | Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
        }
        .login-logo h1 {
            font-size: 1.8rem;
            margin-top: 0.5rem;
        }
        .login-logo span { color: var(--accent); }
        .login-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .login-tab {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--panel-border);
            background: rgba(15,23,42,0.5);
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            text-align: center;
        }
        .login-tab:hover, .login-tab.active {
            background: rgba(59,130,246,0.2);
            color: var(--accent);
            border-color: var(--accent);
        }
        .login-form {
            display: none;
        }
        .login-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        .login-form input {
            width: 100%;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            background: rgba(15,23,42,0.6);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .login-form input:focus {
            border-color: var(--accent);
        }
        .login-form input::placeholder {
            color: var(--text-secondary);
        }
        .login-form .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .login-form .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        .login-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            text-align: center;
        }
        .login-hint code {
            background: rgba(59,130,246,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .error-msg {
            background: rgba(239,68,68,0.2);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-container glass-panel">
            <div class="login-logo">
                <i class="fa-solid fa-futbol"></i>
                <h1>Cancha<span>Pro</span></h1>
                <p class="subtitle">Sistema de Reservas</p>
            </div>

            <div class="login-tabs">
                <button class="login-tab active" data-form="form-user">Usuario</button>
                <button class="login-tab" data-form="form-admin">Admin</button>
                <button class="login-tab" data-form="form-register">Registrarse</button>
            </div>

            <!-- Login Usuario -->
            <form id="form-user" class="login-form active">
                <div id="error-user" class="error-msg"></div>
                <input type="email" id="user-email" placeholder="Correo electrónico" required>
                <input type="password" id="user-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-login"><i class="fa-solid fa-right-to-bracket"></i> Iniciar sesión</button>
                <p class="login-hint">Usuario demo: <code>demo@canchapro.com</code> / <code>demo123</code></p>
            </form>

            <!-- Login Admin -->
            <form id="form-admin" class="login-form">
                <div id="error-admin" class="error-msg"></div>
                <input type="email" id="admin-email" placeholder="Correo de administrador" required>
                <input type="password" id="admin-password" placeholder="Contraseña" required>
                <button type="submit" class="btn-login"><i class="fa-solid fa-shield-halved"></i> Acceso Admin</button>
                <p class="login-hint">Admin demo: <code>admin@canchapro.com</code> / <code>admin123</code></p>
            </form>

            <!-- Registro -->
            <form id="form-register" class="login-form">
                <div id="error-register" class="error-msg"></div>
                <input type="text" id="reg-name" placeholder="Nombre completo" required>
                <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                <input type="password" id="reg-password" placeholder="Contraseña" required>
                <input type="text" id="reg-phone" placeholder="Teléfono (opcional)">
                <button type="submit" class="btn-login"><i class="fa-solid fa-user-plus"></i> Crear cuenta</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">Notificación</div>

    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
