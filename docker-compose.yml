version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: canchapro_db
    restart: always
    environment:
      POSTGRES_DB: canchapro
      POSTGRES_USER: canchapro_user
      POSTGRES_PASSWORD: canchapro_pass
    ports:
      - "5433:5432" # Opcional: para conectarte desde tu host a PostgreSQL
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canchapro_user -d canchapro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canchapro_backend
    restart: always
    environment:
      PORT: 3000
      # Esta URL se usa dentro del contenedor Node para hablar con el servicio "db"
      DATABASE_URL: "postgres://canchapro_user:canchapro_pass@db:5432/canchapro"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    image: nginx:alpine
    container_name: canchapro_frontend
    restart: always
    volumes:
      - ./frontend-web:/usr/share/nginx/html:ro
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
