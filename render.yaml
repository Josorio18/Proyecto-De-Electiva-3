# Render Blueprint - CanchaPro
# Despliega frontend + backend en un solo servicio
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: canchapro
    runtime: node
    rootDir: backend

    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false  # Configurar manualmente en Render Dashboard
